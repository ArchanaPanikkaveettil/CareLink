<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CareLink</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(15, 52, 96, 0.15);
            border: 1px solid #e2e8f0;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo i {
            font-size: 3rem;
            color: #0f3460;
            margin-bottom: 10px;
        }

        .logo h2 {
            color: #0f3460;
            font-weight: 700;
            font-size: 2rem;
        }

        .logo p {
            color: #64748b;
            font-size: 0.9rem;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert-error i {
            color: #991b1b;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        label i {
            color: #0f3460;
            margin-right: 5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #0f3460;
            box-shadow: 0 0 0 3px rgba(15, 52, 96, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #0f3460;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-login:hover {
            background: #1e4a7a;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(15, 52, 96, 0.2);
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .links a:hover {
            color: #0f3460;
        }

        .divider {
            margin: 20px 0;
            text-align: center;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e2e8f0;
            z-index: 1;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            color: #64748b;
            font-size: 0.9rem;
            position: relative;
            z-index: 2;
        }

        .register-links {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .register-btn {
            flex: 1;
            padding: 12px;
            border: 1.5px solid #0f3460;
            border-radius: 10px;
            background: transparent;
            color: #0f3460;
            font-weight: 500;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .register-btn:hover {
            background: #0f3460;
            color: white;
        }

        .back-home {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .back-home a {
            color: #64748b;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: color 0.3s;
        }

        .back-home a:hover {
            color: #0f3460;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .remember-me input {
            width: auto;
        }

        .remember-me label {
            margin-bottom: 0;
            font-weight: normal;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-hand-holding-heart"></i>
                <h2>CareLink</h2>
                <p>Welcome back! Please login to continue</p>
            </div>

            <!-- Messages - Only show errors, hide success messages -->
            {% if messages %}
            {% for message in messages %}
            {% if message.tags == 'error' %}
            <div class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                {{ message }}
            </div>
            {% endif %}
            {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Username / Email</label>
                    <input type="text" name="username" placeholder="Enter your email or username"
                        value="{{ username|default:'' }}" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="remember-me">
                    <input type="checkbox" name="remember" id="remember">
                    <label for="remember">Remember me</label>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="divider">
                <span>New to CareLink?</span>
            </div>

            <div class="register-links">
                <a href="{% url 'family_register' %}" class="register-btn">
                    <i class="fas fa-user-friends"></i> Register as Family
                </a>
                <a href="{% url 'caretaker_register' %}" class="register-btn">
                    <i class="fas fa-user-nurse"></i> Register as Caretaker
                </a>
            </div>

            <div class="back-home">
                <a href="{% url 'index' %}">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>
</body>

</html>
