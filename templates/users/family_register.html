<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Registration - Care Connect</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .register-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 500px;
            width: 90%;
            margin: 20px auto;
        }
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .register-header h2 {
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .register-header p {
            color: #666;
            font-size: 0.9rem;
        }
        .form-label {
            font-weight: 500;
            color: #555;
            margin-bottom: 5px;
        }
        .form-control {
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 10px 15px;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.1);
        }
        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            transition: all 0.3s;
            margin-top: 20px;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .terms-check {
            margin-top: 15px;
        }
        .alert {
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .password-hint {
            font-size: 0.8rem;
            color: #999;
            margin-top: 5px;
        }
        .required-field::after {
            content: " *";
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="register-header">
            <h2>Create Family Account</h2>
            <p>Join Care Connect to find the perfect caretaker</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" id="registerForm">
            {% csrf_token %}
            
            <!-- Name Fields -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label required-field">First Name</label>
                    <input type="text" class="form-control" name="first_name" 
                           placeholder="John" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label required-field">Last Name</label>
                    <input type="text" class="form-control" name="last_name" 
                           placeholder="Doe" required>
                </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label required-field">Email Address</label>
                <input type="email" class="form-control" name="email" 
                       placeholder="john@example.com" required>
                <div class="password-hint">This will be your username for login</div>
            </div>

            <!-- Phone -->
            <div class="mb-3">
                <label class="form-label required-field">Phone Number</label>
                <input type="tel" class="form-control" name="phone" 
                       placeholder="9876543210" required>
            </div>

            <!-- Password Fields -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label required-field">Password</label>
                    <input type="password" class="form-control" name="password" 
                           placeholder="••••••••" minlength="6" required>
                    <div class="password-hint">Minimum 6 characters</div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label required-field">Confirm Password</label>
                    <input type="password" class="form-control" name="confirm_password" 
                           placeholder="••••••••" minlength="6" required>
                </div>
            </div>

            <!-- Terms and Conditions -->
            <div class="terms-check form-check">
                <input type="checkbox" class="form-check-input" name="accepted_terms" id="acceptTerms" required>
                <label class="form-check-label" for="acceptTerms">
                    I agree to the <a href="#" target="_blank">Terms and Conditions</a> and 
                    <a href="#" target="_blank">Privacy Policy</a>
                </label>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-register">Create Account</button>

            <!-- Login Link -->
            <div class="login-link">
                Already have an account? <a href="{% url 'login' %}">Login here</a>
            </div>
        </form>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Password confirmation validation
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const password = document.querySelector('input[name="password"]').value;
            const confirmPassword = document.querySelector('input[name="confirm_password"]').value;
            
            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Passwords do not match!');
            }
        });

        // Auto-hide alerts after 5 seconds
        setTimeout(function() {
            let alerts = document.querySelectorAll('.alert');
            alerts.forEach(function(alert) {
                let bsAlert = new bootstrap.Alert(alert);
                bsAlert.close();
            });
        }, 5000);
    </script>
</body>
</html>
