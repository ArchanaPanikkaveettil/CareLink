<div class="notifications-dropdown">
    <div class="notifications-header">
        <h3><i class="fas fa-bell"></i> Notifications</h3>
        <a href="{% url 'mark_all_notifications_read' %}" class="mark-all-read">
            <i class="fas fa-check-double"></i> Mark all read
        </a>
    </div>

    <div class="notifications-list">
        {% for notification in notifications %}
        <div class="notification-item {% if not notification.is_read %}unread{% endif %}" data-id="{{ notification.id }}">
            <div class="notification-icon">
                <i class="fas fa-{{ notification.icon }}"></i>
            </div>
            <div class="notification-content">
                <p class="notification-message">{{ notification.message }}</p>
                <p class="notification-time">
                    <i class="far fa-clock"></i> {{ notification.created_at|timesince }} ago
                </p>
            </div>
            {% if not notification.is_read %}
            <button class="mark-read-btn" onclick="markNotificationRead('{{ notification.id }}')" title="Mark as read">
                <i class="fas fa-check"></i>
            </button>
            {% endif %}
        </div>
        {% empty %}
        <div class="notification-empty">
            <i class="fas fa-bell-slash" style="font-size: 2rem; margin-bottom: 10px; color: #cbd5e1;"></i>
            <p>No notifications</p>
            <p style="font-size: 0.8rem; margin-top: 5px;">You're all caught up!</p>
        </div>
        {% endfor %}
    </div>

    <div class="notifications-footer">
        <a href="{% url 'all_notifications' %}">
            <i class="fas fa-eye"></i> View all notifications
        </a>
    </div>
</div>

<script>
function markNotificationRead(notificationId) {
    fetch(`/notifications/mark/${notificationId}/`, {
        method: 'POST',
        headers: {
            'X-CSRFToken': '{{ csrf_token }}',
            'Content-Type': 'application/json'
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            // Remove unread class
            const item = document.querySelector(`.notification-item[data-id="${notificationId}"]`);
            item.classList.remove('unread');
            
            // Remove the mark read button
            const btn = item.querySelector('.mark-read-btn');
            if (btn) btn.remove();
            
            // Update notification count in header
            if (typeof updateNotificationCount === 'function') {
                updateNotificationCount();
            }
        }
    })
    .catch(error => console.error('Error:', error));
}
</script>
